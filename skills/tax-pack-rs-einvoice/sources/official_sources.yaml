schema_version: "1.0"
jurisdiction: "RS"
tax_domain: "einvoice"
verified_on: "2026-04-11"
sources:
  - source_id: "rs_einvoice_cius_spec"
    source_name: "Updated specification for the adapted implementation of EN 16931-1"
    source_kind: "specification"
    document_family: "en16931_ubl"
    authority: "SEF / Ministry of Finance"
    landing_url: "https://www.efaktura.gov.rs/tekst/en/5370/updated-specification-for-the-adapted-implementation-of-the-en-16931-1-standard-for-electronic-invoices-in-domestic-trade-in-the-republic-of-serbia.php"
    attachment_url: "https://www.efaktura.gov.rs/extfile/en/5384/spec-srbdt-ext-en16931-2024-08-22.1%20-%20Copy%20%281%29.pdf"
    monitor_strategy:
      primary_anchor: "landing_page_then_attachment"
      detect:
        - "landing_html_checksum"
        - "attachment_checksum"
        - "pdf_first_page_version"
      review_if:
        - "landing page version text changes"
        - "attachment checksum changes"
        - "landing page text and PDF first page disagree"
    landing_page_text_contains:
      - "Updated specification for the adapted implementation of the EN 16931-1 standard for Electronic invoices in domestic trade in the Republic of Serbia"
      - "August 22, 2024"
    version_signal:
      location: "pdf_first_page"
      extraction_mode: "regex"
      regex: "Верзија од \\d{2}\\.\\d{2}\\.\\d{4}\\."
      observed_value: "Верзија од 06.06.2025."
    current_observation:
      observed_on: "2026-04-11"
      notes:
        - "The landing page still says version dated August 22, 2024."
        - "The currently linked PDF first page says version dated 06.06.2025."
        - "Monitor the landing page as the anchor and treat the direct PDF URL as replaceable."

  - source_id: "rs_law_on_electronic_invoicing"
    source_name: "Law on Electronic Invoicing"
    source_kind: "law"
    document_family: "einvoice_law"
