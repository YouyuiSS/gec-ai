sources:
  - source_id: "xx_primary_spec"
    source_name: "Replace with the official specification title"
    source_kind: "specification"
    document_family: "en16931_ubl"
    authority: "Replace with the issuing authority"
    landing_url: "https://example.gov/specification-page"
    attachment_url: "https://example.gov/specification.pdf"
    monitor_strategy:
      primary_anchor: "landing_page_then_attachment"
      detect:
        - "landing_html_checksum"
        - "attachment_checksum"
